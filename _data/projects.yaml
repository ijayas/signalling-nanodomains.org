- title: Single molecule spatial omics meets cardiac pathology
  subtitle: 
  group: projects
  image: images/heart_circuit.jpg
  link: https://www.unsw.edu.au/news/2023/10/unsw-researcher-awarded-nsw-health-cardiovascular-grant
  description: In a 3-year project funded by New South Wales Medical Research, we are developing single molecule imaging and spatial omics tools to study systems of key signalling molecules and their regulators in the healthy and failing myocardium. We are bringing together multiplexed super-resolution imaging, big data pipelines and machine learning to understand how these molecular systems of signalling lose their balance as a heart begins to fail.
  tags:
    - spatial omics
    - heart disease
    - molecular networks
    - machine learning

- title: Accessible super-resolution to all life scientists
  subtitle: 
  group: projects
  image: images/UKRI-project.png 
  link: https://youtu.be/vqkzDOiWVXs?si=4rM2TocuRIrGcpWM
  description: In a project originally started with a UK Research & Innovation Future Leader Fellowship awarded to Izzy, we continue to develop several innovations that are aimed at making super-resolution microscopy, expansion microscopy in particular, accessible and affordable for life sciences researchers. Amongst some of the work completed so far, we have characterised a series of 14 nondescript stains and 3D printed microplates for expansion microscopy. As a part of this project, we are also applying super-resolution to sample types and sub-fields that have not utilised super-resolution as much as mainstream cell biology. They include imaging thick tissues and whole organisms such as sea urchin larvae. 
  tags:
    - expansion microscopy
    - rapid prototyping
    - nondescript staining
    - democraticing super-resolution

- title: Calcium-mobilised orchestration of Rab GTPases at vesicular intracellular compartments
  subtitle: 
  group: projects
  image: images/endo.jpg
  link: https://cen.acs.org/analytical-chemistry/microscopy/exm-toolkit-distortion-correction-protein-nanocages/104/web/2026/04
  description: We have an ongoing interest in the Rab GTPases and their associated functions in driving the maturation and mobilisation of intracellular compartments such as endosomes and secretory granules. In a recent study published in ACS Nano, we show how we can map the nanoscale assemblies of Rab GTPases on surface sub-domains of such organelles. In ongoing work, we look to understand their relationship to calcium signals that initiate their mobilisation.
  repo: https://zenodo.org/records/18711950
  tags:
    - Rab GTPases
    - endosomes
    - calcium signalling
    - 3D super-resolution


